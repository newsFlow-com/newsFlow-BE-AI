version: '3.8'

services:
  ai-server:
    build: .
    container_name: newsflow-ai
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./app:/app/app
    networks:
      - newsflow-network
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: newsflow-ai-redis
    ports:
      - "6380:6379"
    networks:
      - newsflow-network

  celery-worker:
    build: .
    container_name: newsflow-celery
    command: celery -A app.tasks.celery_app worker --loglevel=info
    env_file:
      - .env
    volumes:
      - ./app:/app/app
    networks:
      - newsflow-network
    depends_on:
      - redis

networks:
  newsflow-network:
    driver: bridge